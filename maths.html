<!DOCTYPE html>
<html>
<head>
    <title>GCSE Maths Revision Quiz</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        .quiz-container {
            max-width: 600px;
            margin: auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
        }
        .question {
            margin: 20px 0;
        }
        .options {
            list-style-type: none;
            padding: 0;
        }
        .options li {
            margin: 10px 0;
        }
        .result {
            text-align: center;
            font-size: 1.2em;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="quiz-container">
        <h1>GCSE Maths Revision Quiz</h1>
        <div id="quiz"></div>
        <button id="submit">Submit</button>
        <div class="result" id="result"></div>
        <button id="retry" style="display:none;">Retry</button>
    </div>

    <script>
        const questions = [
            {
                question: 'What is 7 + 5?',
                options: ['10', '12', '14', '16'],
                answer: 1
            },
            {
                question: 'What is the square root of 64?',
                options: ['6', '7', '8', '9'],
                answer: 2
            },
            {
                question: 'What is 15 - 6?',
                options: ['9', '7', '8', '10'],
                answer: 0
            },
            {
                question: 'What is 3 * 9?',
                options: ['27', '26', '28', '25'],
                answer: 0
            }
        ];

        let score = 0;

        function loadQuiz() {
            const quizContainer = document.getElementById('quiz');
            questions.forEach((q, index) => {
                const questionElement = document.createElement('div');
                questionElement.classList.add('question');
                questionElement.innerHTML = `<div>${index + 1}. ${q.question}</div>`;
                const optionsList = document.createElement('ul');
                optionsList.classList.add('options');
                q.options.forEach((option, i) => {
                    optionsList.innerHTML += `<li><input type='radio' name='question${index}' value='${i}'> ${option}</li>`;
                });
                questionElement.appendChild(optionsList);
                quizContainer.appendChild(questionElement);
            });
        }

        function submitQuiz() {
            const allOptions = document.querySelectorAll('.options input:checked');
            allOptions.forEach((option, index) => {
                if (Number(option.value) === questions[index].answer) {
                    score++;
                }
            });
            document.getElementById('result').innerText = `You scored ${score} out of ${questions.length}`;
            document.getElementById('submit').style.display = 'none';
            document.getElementById('retry').style.display = 'block';
        }

        function retryQuiz() {
            score = 0;
            document.getElementById('result').innerText = '';
            document.getElementById('submit').style.display = 'block';
            document.getElementById('retry').style.display = 'none';
            document.getElementById('quiz').innerHTML = '';
            loadQuiz();
        }

        document.getElementById('submit').addEventListener('click', submitQuiz);
        document.getElementById('retry').addEventListener('click', retryQuiz);
        loadQuiz();
    </script>
</body>
</html>
